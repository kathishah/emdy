name: Emdy
options:
  bundleIdPrefix: com.emdy
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  swift-cmark:
    url: https://github.com/apple/swift-cmark
    from: "0.4.0"

targets:
  Emdy:
    type: application
    platform: macOS
    sources:
      - path: Emdy
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Emdy/Fonts
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.emdy.app
        INFOPLIST_FILE: Emdy/Info.plist
        PRODUCT_NAME: Emdy
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: true
    dependencies:
      - package: swift-cmark
        product: cmark-gfm
      - package: swift-cmark
        product: cmark-gfm-extensions
    preBuildScripts: []

  EmdyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: EmdyTests
    dependencies:
      - target: Emdy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.emdy.app.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Emdy.app/Contents/MacOS/Emdy"
        BUNDLE_LOADER: "$(TEST_HOST)"
